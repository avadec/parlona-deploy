name: voicecore

services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --protected-mode yes
    volumes:
      - redis_data:/data
    networks:
      - voicecore_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-parlonacore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-parlonacore}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - voicecore_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parlonacore} -d ${POSTGRES_DB:-parlonacore}"]
      interval: 5s
      timeout: 3s
      retries: 30

  call_analytics_api:
    image: ${DOCKER_REGISTRY:-parlona}/voicecore-api:${VOICECORE_VERSION:-1.3.0}
    env_file:
      - ${VOICECORE_ENV_FILE:-.env}
    environment:
      SERVICE_NAME: call_analytics_api
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-parlonacore}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-parlonacore}
      POSTGRES_DSN_PSYCOPG: postgresql+psycopg://${POSTGRES_USER:-parlonacore}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-parlonacore}
      RUN_DB_MIGRATIONS: "1"
      STORAGE_DIR: /app/storage
      CALL_API_KEY: ${CALL_API_KEY:?CALL_API_KEY is required}
      KEYCLOAK_ENABLED: "${KEYCLOAK_ENABLED:-0}"
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://localhost:9090}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-voicecore}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-voicecore-frontend}
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - audio_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - voicecore_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()\""]
      interval: 10s
      timeout: 3s
      retries: 18
      start_period: 20s

  stt_service:
    image: ${DOCKER_REGISTRY:-parlona}/voicecore-stt:${VOICECORE_VERSION:-1.3.0}
    env_file:
      - ${VOICECORE_ENV_FILE:-.env}
    environment:
      SERVICE_NAME: stt_service
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      STORAGE_DIR: /app/storage
      STT_DIARIZATION_MODE: ${STT_DIARIZATION_MODE:-stereo_channels}
      STT_STEREO_SPEAKER_MAPPING: ${STT_STEREO_SPEAKER_MAPPING:-0:manager,1:customer}
      STT_ENABLE_GPU: ${STT_ENABLE_GPU:-0}
      FORCE_CPU: ${FORCE_CPU:-1}
      STT_MODEL_NAME: ${STT_MODEL_NAME:-Systran/faster-whisper-small}
      WHISPER_MODEL_DIR: /models/whisper
      WHISPER_LOCAL_ONLY: ${WHISPER_LOCAL_ONLY:-0}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
    volumes:
      - audio_storage:/app/storage
      - whisper_cache:/models/whisper
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - voicecore_network
    restart: unless-stopped

  summary_service:
    image: ${DOCKER_REGISTRY:-parlona}/voicecore-summary:${VOICECORE_VERSION:-1.3.0}
    env_file:
      - ${VOICECORE_ENV_FILE:-.env}
    environment:
      SERVICE_NAME: summary_service
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      LLM_BACKEND: ${LLM_BACKEND:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://host.docker.internal:8000/v1}
      VLLM_API_KEY: ${VLLM_API_KEY:-EMPTY}
      VLLM_MODEL: ${VLLM_MODEL:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      GROQ_MODEL: ${GROQ_MODEL:-llama3-8b-8192}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
    volumes:
      - audio_storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - voicecore_network
    restart: unless-stopped

  postprocess_service:
    image: ${DOCKER_REGISTRY:-parlona}/voicecore-postprocess:${VOICECORE_VERSION:-1.3.0}
    env_file:
      - ${VOICECORE_ENV_FILE:-.env}
    environment:
      SERVICE_NAME: postprocess_service
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-parlonacore}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-parlonacore}
      POSTGRES_DSN_PSYCOPG: postgresql+psycopg://${POSTGRES_USER:-parlonacore}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-parlonacore}
      RUN_DB_MIGRATIONS: "0"
      STORAGE_DIR: /app/storage
      KEYCLOAK_ENABLED: "${KEYCLOAK_ENABLED:-0}"
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://localhost:9090}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-voicecore}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-voicecore-frontend}
    volumes:
      - audio_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - voicecore_network
    restart: unless-stopped

  frontend:
    image: ${DOCKER_REGISTRY:-parlona}/voicecore-frontend:${VOICECORE_VERSION:-1.3.0}
    env_file:
      - ${VOICECORE_ENV_FILE:-.env}
    environment:
      API_BASE_URL: http://call_analytics_api:8080
      CALL_API_KEY: ${CALL_API_KEY}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_API_BASE_URL: http://call_analytics_api:8080
      NEXT_PUBLIC_CALL_API_KEY: ${CALL_API_KEY}
      AUTH_USERS: ${AUTH_USERS:-admin:change-me}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET is required}
      KEYCLOAK_ENABLED: "${KEYCLOAK_ENABLED:-0}"
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://localhost:9090}
      NEXT_PUBLIC_KEYCLOAK_ENABLED: "${KEYCLOAK_ENABLED:-0}"
      NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-http://localhost:9090}
      NEXT_PUBLIC_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-voicecore}
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-voicecore-frontend}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      call_analytics_api:
        condition: service_started
    networks:
      - voicecore_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 18
      start_period: 20s

volumes:
  redis_data:
  postgres_data:
  audio_storage:
  whisper_cache:

networks:
  voicecore_network:
    driver: bridge
